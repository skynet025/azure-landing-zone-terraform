# Nom du workflow affiché dans GitHub Actions
name: terraform-ci

# Déclencheurs du pipeline
on:
  # Validation sur Pull Request vers main
  pull_request:
    branches:
      - main

  # Validation sur push direct vers main
  push:
    branches:
      - main

# Permissions minimales nécessaires
permissions:
  id-token: write   # requis pour l'authentification OIDC vers Azure
  contents: read    # lecture du contenu du repository

# Évite plusieurs exécutions concurrentes sur la même branche
concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

# Variables globales du job
env:
  TF_IN_AUTOMATION: true

  # -----------------------------------------------------------------
  # Variables Terraform injectées par GitHub Actions
  # -----------------------------------------------------------------
  # On ne versionne pas subscription_id et tenant_id dans le tfvars.
  # Elles sont injectées par le pipeline via le mécanisme standard
  # TF_VAR_<nom_variable>.
  # -----------------------------------------------------------------
  TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: Terraform CI
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------
      # Checkout du code source
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Installation de Terraform
      # -----------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -----------------------------------------------------------------
      # Authentification Azure via OIDC
      # -----------------------------------------------------------------
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------
      # Vérification du format Terraform
      # -----------------------------------------------------------------
      - name: Terraform format check
        run: terraform fmt -check -recursive

      # -----------------------------------------------------------------
      # Initialisation Terraform
      # -----------------------------------------------------------------
      - name: Terraform init
        run: terraform init -input=false

      # -----------------------------------------------------------------
      # Validation syntaxique et structurelle
      # -----------------------------------------------------------------
      - name: Terraform validate
        run: terraform validate

      # -----------------------------------------------------------------
      # Génération du plan Terraform avec le fichier d'environnement NP
      # -----------------------------------------------------------------
      - name: Terraform plan
        run: terraform plan -input=false -lock-timeout=300s -var-file="config/np.tfvars"