# Nom du workflow affiché dans GitHub Actions
name: terraform-ci

# Déclencheurs du pipeline
on:
  # Validation sur Pull Request vers main
  pull_request:
    branches:
      - main

  # Validation sur push direct vers main
  push:
    branches:
      - main

# Permissions minimales nécessaires
permissions:
  id-token: write   # requis pour l'authentification OIDC vers Azure
  contents: read    # lecture du contenu du repository

# Évite plusieurs exécutions concurrentes sur la même branche
concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform CI (np)
    runs-on: ubuntu-latest

    # -----------------------------------------------------------------
    # Le CI s'exécute contre l'environnement non-production.
    # Ne mets pas de reviewers obligatoires sur np, sinon ton CI sera bloqué.
    # -----------------------------------------------------------------
    environment:
      name: np

    # -----------------------------------------------------------------
    # Variables Terraform injectées depuis l'environment GitHub.
    # On ne dépend plus d'un fichier tfvars versionné.
    # -----------------------------------------------------------------
    env:
      TF_IN_AUTOMATION: true

      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}

      TF_VAR_org: ${{ vars.ORG }}
      TF_VAR_workload: ${{ vars.WORKLOAD }}
      TF_VAR_scope: ${{ vars.SCOPE }}
      TF_VAR_env: ${{ vars.ENV }}
      TF_VAR_region_code: ${{ vars.REGION_CODE }}
      TF_VAR_instance: ${{ vars.INSTANCE }}
      TF_VAR_location: ${{ vars.LOCATION }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_costcenter: ${{ vars.COSTCENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
      TF_VAR_admin_public_ip: ${{ vars.ADMIN_PUBLIC_IP }}
      TF_VAR_vm_admin_username: ${{ vars.VM_ADMIN_USERNAME }}

      TF_VAR_github_sp_object_id: ${{ vars.SP_GITHUB_OBJECT_ID }}
      TF_VAR_local_user_object_id: ${{ vars.LOCAL_USER_OBJECT_ID }}

    steps:
      # -----------------------------------------------------------------
      # Checkout du code source
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Installation de Terraform
      # -----------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -----------------------------------------------------------------
      # Authentification Azure via OIDC
      # -----------------------------------------------------------------
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------
      # Vérification du format Terraform
      # -----------------------------------------------------------------
      - name: Terraform format check
        run: terraform fmt -check -recursive

      # -----------------------------------------------------------------
      # Initialisation Terraform
      # -----------------------------------------------------------------
      - name: Terraform init
        run: terraform init -input=false

      # -----------------------------------------------------------------
      # Validation syntaxique et structurelle
      # -----------------------------------------------------------------
      - name: Terraform validate
        run: terraform validate

      # -----------------------------------------------------------------
      # Génération du plan Terraform sans tfvars versionné
      # -----------------------------------------------------------------
      - name: Terraform plan
        run: terraform plan -input=false -lock-timeout=300s