# Nom du workflow affiché dans GitHub Actions
name: terraform-apply

# Déclenchement manuel avec choix de l'environnement
on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "GitHub environment to deploy"
        required: true
        default: "np"
        type: choice
        options:
          - np
          - prd

# Permissions minimales nécessaires
permissions:
  id-token: write
  contents: read

# Évite les apply concurrents sur le même environnement
concurrency:
  group: terraform-apply-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    # -----------------------------------------------------------------
    # Le job s'exécute dans l'environnement sélectionné.
    # Cela permet de réutiliser le même workflow pour np puis prd.
    # -----------------------------------------------------------------
    environment:
      name: ${{ inputs.target_environment }}

    env:
      TF_IN_AUTOMATION: true

      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}

      TF_VAR_org: ${{ vars.ORG }}
      TF_VAR_workload: ${{ vars.WORKLOAD }}
      TF_VAR_scope: ${{ vars.SCOPE }}
      TF_VAR_env: ${{ vars.ENV }}
      TF_VAR_region_code: ${{ vars.REGION_CODE }}
      TF_VAR_instance: ${{ vars.INSTANCE }}
      TF_VAR_location: ${{ vars.LOCATION }}
      TF_VAR_owner: ${{ vars.OWNER }}
      TF_VAR_costcenter: ${{ vars.COSTCENTER }}
      TF_VAR_data_classification: ${{ vars.DATA_CLASSIFICATION }}
      TF_VAR_admin_public_ip: ${{ vars.ADMIN_PUBLIC_IP }}
      TF_VAR_vm_admin_username: ${{ vars.VM_ADMIN_USERNAME }}

      TF_VAR_github_sp_object_id: ${{ vars.SP_GITHUB_OBJECT_ID }}
      TF_VAR_local_user_object_id: ${{ vars.LOCAL_USER_OBJECT_ID }}

    steps:
      # -----------------------------------------------------------------
      # Checkout du code source
      # -----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # Installation de Terraform
      # -----------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -----------------------------------------------------------------
      # Authentification Azure via OIDC
      # -----------------------------------------------------------------
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------
      # Contrôle de format
      # -----------------------------------------------------------------
      - name: Terraform format check
        run: terraform fmt -check -recursive

      # -----------------------------------------------------------------
      # Initialisation Terraform
      # -----------------------------------------------------------------
      - name: Terraform init
        run: terraform init -input=false

      # -----------------------------------------------------------------
      # Validation Terraform
      # -----------------------------------------------------------------
      - name: Terraform validate
        run: terraform validate

      # -----------------------------------------------------------------
      # Plan Terraform
      # -----------------------------------------------------------------
      - name: Terraform plan
        run: terraform plan -input=false -lock-timeout=300s

      # -----------------------------------------------------------------
      # Apply Terraform
      # L'apply reste manuel via workflow_dispatch.
      # -----------------------------------------------------------------
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -lock-timeout=300s